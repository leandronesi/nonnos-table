name: Refresh & Deploy · GitHub Pages

# Pipeline v2:
#   ingest → analyze (Stockfish apt) → build_positions_db → maia_features (lc0+pesi)
#   → derive_features → enrich_decisions → player_model → coach (OpenAI opzionale)
#   → vite build → gh-pages
#
# Triggers:
#   - schedule giornaliero 04:00 UTC
#   - push su main (esclusi .md)
#   - manuale (workflow_dispatch) con flag --deep
on:
  schedule:
    - cron: '0 4 * * *'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      deep:
        description: "Profilo Stockfish 'deep' (depth 22, lento ma più accurato)"
        required: false
        default: 'false'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  LC0_VERSION: v0.31.2

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Stockfish (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y stockfish
          which stockfish

      # Cache engines (lc0 + Maia weights) — riusabile tra run, raramente cambia.
      - name: Cache lc0 + Maia weights
        id: cache-engines
        uses: actions/cache@v4
        with:
          path: |
            engine/lc0
            engine/maia
          key: engines-lc0-${{ env.LC0_VERSION }}-maia-1200-1600

      # Lc0 NON distribuisce binari Linux nei release ufficiali. Compiliamo da
      # sorgenti la prima volta (~5-8 min) e cachiamo il binario.
      - name: Build lc0 from source + download Maia weights
        if: steps.cache-engines.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y meson ninja-build libopenblas-dev libgflags-dev libeigen3-dev libprotobuf-dev protobuf-compiler libgtest-dev zlib1g-dev
          mkdir -p engine/lc0 engine/maia
          git clone --depth 1 --branch ${LC0_VERSION} https://github.com/LeelaChessZero/lc0 /tmp/lc0src
          cd /tmp/lc0src
          git submodule update --init --recursive
          meson setup build --buildtype=release -Dgtest=false -Dpopcnt=false
          ninja -C build lc0
          cp build/lc0 $GITHUB_WORKSPACE/engine/lc0/lc0
          chmod +x $GITHUB_WORKSPACE/engine/lc0/lc0
          $GITHUB_WORKSPACE/engine/lc0/lc0 --version | head -3
          curl -L -o $GITHUB_WORKSPACE/engine/maia/maia-1200.pb.gz https://raw.githubusercontent.com/CSSLab/maia-chess/master/maia_weights/maia-1200.pb.gz
          curl -L -o $GITHUB_WORKSPACE/engine/maia/maia-1600.pb.gz https://raw.githubusercontent.com/CSSLab/maia-chess/master/maia_weights/maia-1600.pb.gz
          ls -la $GITHUB_WORKSPACE/engine/lc0 $GITHUB_WORKSPACE/engine/maia

      # Cache dei dati di analisi (raw PGN + Stockfish per-game + DB).
      # Cresce solo con partite nuove → run successivi richiedono ~2 min.
      - name: Cache analysis data
        uses: actions/cache@v4
        with:
          path: |
            data/raw
            data/analysis
            data/index.json
            data/positions.db
          key: chess-data-${{ github.run_id }}
          restore-keys: |
            chess-data-

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Step 1 · Fetch new games
        env:
          STOCKFISH_PATH: /usr/games/stockfish
        run: python backend/ingest.py

      - name: "Step 2 · Stockfish analyze (cache aware)"
        env:
          STOCKFISH_PATH: /usr/games/stockfish
        run: |
          if [ "${{ github.event.inputs.deep }}" = "true" ]; then
            python backend/analyze.py --deep
          else
            python backend/analyze.py
          fi

      - name: Step 3 · Build positions.db
        run: python backend/build_positions_db.py

      - name: Step 4 · Maia inference on critical positions (opzionale)
        continue-on-error: true
        env:
          STOCKFISH_PATH: /usr/games/stockfish
        run: |
          echo "=== Diagnostica engine/lc0/ ==="
          ls -la engine/ || true
          ls -la engine/lc0/ || true
          ls -la engine/maia/ || true
          if [ -f engine/lc0/lc0 ]; then
            chmod +x engine/lc0/lc0 || true
            echo "=== lc0 trovato, verifica esecuzione ==="
            engine/lc0/lc0 --version 2>&1 | head -5 || echo "lc0 fallisce all'esecuzione"
          fi
          if [ -x engine/lc0/lc0 ]; then
            echo "=== Lancio maia_features.py ==="
            python backend/maia_features.py
          else
            echo "::warning::lc0 non eseguibile (path engine/lc0/lc0). Maia inference skippato. Drills funzionano in fallback."
          fi

      - name: Step 5 · Derive flags + enrich decisions
        run: |
          python backend/derive_features.py
          python backend/enrich_decisions.py

      - name: "Step 5b · Tactical patterns (hanging/fork/back-rank/discovered)"
        run: python backend/tactical_patterns.py

      - name: Step 6 · Player model
        run: python backend/player_model.py

      - name: "Step 7a · Check coach_brain PAT"
        id: brain_pat_check
        env:
          PAT: ${{ secrets.COACH_BRAIN_REPO_PAT }}
        run: |
          if [ -n "$PAT" ]; then echo "has_pat=true" >> $GITHUB_OUTPUT; else echo "has_pat=false" >> $GITHUB_OUTPUT; fi

      - name: "Step 7b · Clona coach_brain privato"
        if: steps.brain_pat_check.outputs.has_pat == 'true'
        env:
          PAT: ${{ secrets.COACH_BRAIN_REPO_PAT }}
        run: |
          # Repo privato con persona/wiki/templates del coach LLM
          # (Crea su GitHub: leandronesi/chess_coach_brain privato, poi PAT con scope `repo`)
          git clone --depth 1 "https://x-access-token:${PAT}@github.com/leandronesi/chess_coach_brain.git" backend/coach_brain
          ls -la backend/coach_brain/ || echo "brain clone failed, coach girerà in fallback regole"

      - name: Step 7c · Coach brief (OpenAI gpt-5.4-mini, fallback regole se manca secret/brain)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python backend/coach.py

      - name: Export per-game analyses (for drill-down statico)
        run: python backend/export_analysis.py

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build static site
        working-directory: frontend
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      # GitHub Pages non gestisce SPA routing nativamente: senza 404.html, hit
      # diretto su /Mygotham/cruscotto -> 404. Soluzione standard: copia
      # index.html come 404.html, GH Pages serve 404 e React Router risolve.
      - name: SPA fallback for gh-pages (copy index.html as 404.html)
        working-directory: frontend
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
