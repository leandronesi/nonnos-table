<!doctype html>
<html lang="it" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Nonno's Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      // Companion del 404.html: se il 404 ha salvato un path desiderato,
      // ripristinalo nell'URL prima del bootstrap di React. Così deep link
      // come /Mygotham/onboarding sopravvivono al refresh su GH Pages.
      (function () {
        var saved = sessionStorage.getItem("nonno_spa_redirect");
        if (saved) {
          sessionStorage.removeItem("nonno_spa_redirect");
          if (saved !== window.location.pathname + window.location.search + window.location.hash) {
            window.history.replaceState(null, "", saved);
          }
        }
      })();
    </script>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
